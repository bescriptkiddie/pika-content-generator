# PikaEngine 场景配置
# 每个场景定义自己的 M1→M2→M3→M4→M5 管道

scenes:
  xiaohongshu_growth:
    name: "小红书-女性成长"
    enabled: true
    schedule: "0 8,12,18 * * *"
    pipeline:
      m1_acquire:
        type: "xiaohongshu"
        config:
          mode: search
          keywords: ["女性成长", "自我提升女生", "独立女性", "优势发展", "个人成长"]
          max_per_keyword: 8
          provider_order:
            search: ["xhs_cli_search", "bb_search", "browser_search"]
            feed: ["xhs_cli_feed", "bb_feed", "browser_feed"]
            cross_platform: ["hosted_cross_platform"]
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000
          dailyhot_api_base: http://localhost:6688
          fetch_details: false
          detail_top_n: 3
          domain: "女性成长与自我提升"
          target_audience: "20-35岁追求自我成长的女性"
          knowledge_sources: ["dan_koe", "james_clear", "mark_manson", "sahil_bloom"]
          brand_voice: "温暖有力量、真诚分享、像闺蜜聊天一样"
          top_n: 3

  xiaohongshu_biz:
    name: "小红书-个人品牌/副业"
    enabled: true
    schedule: "0 9,13,19 * * *"
    pipeline:
      m1_acquire:
        type: "xiaohongshu"
        config:
          mode: search
          keywords: ["个人品牌", "一人企业", "副业赚钱", "自媒体变现", "知识IP"]
          max_per_keyword: 8
          provider_order:
            search: ["xhs_cli_search", "bb_search", "browser_search"]
            feed: ["xhs_cli_feed", "bb_feed", "browser_feed"]
            cross_platform: ["hosted_cross_platform"]
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000
          dailyhot_api_base: http://localhost:6688
          fetch_details: false
          detail_top_n: 3
          domain: "个人品牌与一人企业"
          target_audience: "25-40岁想打造个人品牌或副业变现的职场人"
          knowledge_sources: ["dan_koe", "alex_hormozi", "justin_welsh", "naval"]
          brand_voice: "犀利实操、不说废话、干货密度高"
          top_n: 3

  xiaohongshu_writing:
    name: "小红书-写作/内容创作"
    enabled: true
    schedule: "0 10,14,20 * * *"
    pipeline:
      m1_acquire:
        type: "xiaohongshu"
        config:
          mode: search
          keywords: ["写作技巧", "自媒体写作", "爆款文案", "内容创作", "文笔提升"]
          max_per_keyword: 8
          provider_order:
            search: ["xhs_cli_search", "bb_search", "browser_search"]
            feed: ["xhs_cli_feed", "bb_feed", "browser_feed"]
            cross_platform: ["hosted_cross_platform"]
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000
          dailyhot_api_base: http://localhost:6688
          fetch_details: false
          detail_top_n: 3
          domain: "写作与内容创作"
          target_audience: "想通过写作建立影响力的创作者"
          knowledge_sources: ["nicolas_cole", "dickie_bush", "dan_koe"]
          brand_voice: "专业但不装、有案例有方法"
          top_n: 3

  xiaohongshu_trending:
    name: "小红书-全站热度感知"
    enabled: true
    schedule: "0 7,11,17 * * *"
    pipeline:
      m1_acquire:
        type: "xiaohongshu"
        config:
          mode: trending
          keywords: ["女性成长", "个人品牌", "一人企业", "副业赚钱", "AI工具"]
          max_notes: 20
          max_per_keyword: 5
          provider_order:
            search: ["xhs_cli_search", "bb_search", "browser_search"]
            feed: ["xhs_cli_feed", "bb_feed", "browser_feed"]
            cross_platform: ["hosted_cross_platform"]
          cross_platforms: ["zhihu", "toutiao", "douyin", "bilibili", "36kr"]
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000
          dailyhot_api_base: http://localhost:6688
          fetch_details: false
          detail_top_n: 3
          save_daily_snapshot: true
          domain: "女性成长与个人品牌"
          target_audience: "20-35岁追求成长与变现的女性"
          knowledge_sources: ["dan_koe", "alex_hormozi", "james_clear", "naval"]
          brand_voice: "温暖有力量、真诚分享、像闺蜜聊天一样"
          top_n: 5
      m4_execute:
        type: "xiaohongshu_publish"
        config:
          auto_publish: false
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000

  xiaohongshu:
    name: "小红书内容运营"
    enabled: true
    schedule: "0 8,12,18 * * *"
    pipeline:
      m1_acquire:
        type: "xiaohongshu"
        config:
          mode: search
          keywords: ["AI工具", "效率提升", "副业"]
          max_per_keyword: 10
          provider_order:
            search: ["xhs_cli_search", "bb_search", "browser_search"]
            feed: ["xhs_cli_feed", "bb_feed", "browser_feed"]
            cross_platform: ["hosted_cross_platform"]
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000
          dailyhot_api_base: http://localhost:6688
          fetch_details: true
          detail_top_n: 5
          competitor_ids: []
          max_items: 20
      m2_analyze:
        type: "trending"
        config:
          min_score: 0.6
          top_n: 5
      m3_generate:
        model: "deepseek-chat"
        template: "xiaohongshu_post"
        knowledge_sources: ["dan_koe", "naval", "alex_hormozi"]
      m4_execute:
        type: "xiaohongshu_publish"
        config:
          auto_publish: false
          draft_limit: 10
          browser_backend: playwright_persistent
          user_data_dir: ~/.pikaengine/playwright/xiaohongshu
          playwright_channel: chrome
          headless: false
          startup_timeout_ms: 30000
          action_timeout_ms: 15000
          navigation_timeout_ms: 30000
      m5_feedback:
        type: "xiaohongshu_metrics"
        config:
          track_fields: ["likes", "comments", "shares", "views"]
          check_interval: 3600

  gallup_agent:
    name: "盖洛普教练Agent"
    enabled: false
    pipeline:
      m1_acquire:
        type: "gallup"
        config:
          sources: ["coach_community", "industry_trends"]
      m2_analyze:
        type: "gallup_report"
        config:
          report_parser: "gallup_34_themes"
      m3_generate:
        model: "claude-sonnet-4-6"
        template: "gallup_coach_report"
        knowledge_base: "gallup_kb"
      m4_execute:
        type: "gallup_deliver"
        config:
          delivery_method: "api"

  geo:
    name: "GEO内容站点"
    enabled: true
    pipeline:
      m1_acquire:
        type: "geo"
        config:
          search_engines: ["google", "bing", "perplexity"]
          brand_keywords: []
      m2_analyze:
        type: "keyword_gap"
      m3_generate:
        model: "deepseek-chat"
        template: "geo_article"
        knowledge_sources: ["dan_koe", "alex_hormozi", "james_clear", "ryan_holiday", "naval"]
      m4_execute:
        type: "geoflow"
        config:
          need_review: true
          auto_keywords: true
          auto_description: true

  quant_a_stock:
    name: "A股量化"
    enabled: false
    pipeline:
      m1_acquire:
        type: "quant_a_stock"
        config:
          data_sources: ["tushare", "akshare"]
          symbols: []
          indicators: ["ma", "macd", "rsi"]
      m2_analyze:
        type: "signal"
        config:
          strategy: "friend_strategy_v1"
      m3_generate:
        type: "trading_signal"
      m3_5_risk_gate:
        enabled: true
        config:
          max_position_pct: 0.2
          max_daily_loss_pct: 0.03
          blocked_hours: ["09:15-09:30", "14:55-15:00"]
      m4_execute:
        type: "trading"
        config:
          broker: "manual"
          require_confirmation: true

  quant_crypto:
    name: "加密货币量化"
    enabled: false
    pipeline:
      m1_acquire:
        type: "quant_crypto"
        config:
          exchanges: ["binance", "okx"]
          data_sources: ["ccxt", "dune", "nansen"]
          pairs: []
      m2_analyze:
        type: "signal"
        config:
          strategy: "friend_strategy_v1"
      m3_generate:
        type: "trading_signal"
      m3_5_risk_gate:
        enabled: true
        config:
          max_position_pct: 0.15
          max_daily_loss_pct: 0.05
          min_liquidity_usd: 100000
          max_slippage_pct: 0.01
      m4_execute:
        type: "trading"
        config:
          exchange_api: "ccxt"
          require_confirmation: true
